<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="A modern, production-grade calculator application built with TypeScript"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Calculator | Production-Grade Calculator App</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="calculator-container minimal" role="main">
  <div class="calculator minimal">
    <div class="display minimal">
      <div class="previous-operand" id="previous-operand"></div>
      <div class="current-operand" id="current-operand">0</div>
    </div>
    <div class="buttons minimal">
      <button class="btn function" data-action="clear" aria-label="Clear">C</button>
      <button class="btn function" data-action="delete" aria-label="Delete">⌫</button>
      <button class="btn function" data-action="percent" aria-label="Percent">%</button>
      <button class="btn operator" data-action="operator" data-value="/" aria-label="Divide">÷</button>

      <button class="btn number" data-value="7">7</button>
      <button class="btn number" data-value="8">8</button>
      <button class="btn number" data-value="9">9</button>
      <button class="btn operator" data-action="operator" data-value="*" aria-label="Multiply">×</button>

      <button class="btn number" data-value="4">4</button>
      <button class="btn number" data-value="5">5</button>
      <button class="btn number" data-value="6">6</button>
      <button class="btn operator" data-action="operator" data-value="-" aria-label="Subtract">−</button>

      <button class="btn number" data-value="1">1</button>
      <button class="btn number" data-value="2">2</button>
      <button class="btn number" data-value="3">3</button>
      <button class="btn operator" data-action="operator" data-value="+" aria-label="Add">+</button>

      <button class="btn number zero" data-value="0">0</button>
      <button class="btn number" data-value=".">.</button>
      <button class="btn operator equals" data-action="calculate" aria-label="Equals">=</button>
    </div>
  </div>
</main>


    <script type="module" src="./main.ts"></script>
  </body>
</html>
